name: Publish Quarto

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: Rscript -e 'install.packages(c("tidyverse","hms","scales","forecast","slider","plotly","lubridate"), repos="https://cloud.r-project.org")'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Render
        run: quarto render

      - name: List rendered files
        run: ls -R _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
