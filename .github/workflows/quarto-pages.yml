name: Publish Quarto site
on:
  push:
    branches: [master]
    paths:
      - "pms_logs/**"
      - "quarto/**"
      - ".github/workflows/quarto-pages.yml"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Set up R package cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-${{ hashFiles('.github/workflows/quarto-pages.yml') }}
          restore-keys: r-pkgs-${{ runner.os }}-

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libcairo2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R packages
        shell: Rscript {0}
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          pkgs <- c(
            "knitr", "rmarkdown", "quarto",
            "dplyr", "ggplot2", "readr",
            "tidyr", "tibble", "purrr",
            "lubridate", "hms", "scales",
            "forecast", "slider", "plotly"
          )
          pkgs_to_install <- pkgs[!pkgs %in% installed.packages()[, "Package"]]
          if (length(pkgs_to_install)) {
            install.packages(pkgs_to_install, dependencies = TRUE)
          }

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Render Quarto project
        run: quarto render ./quarto
        env:
          PMS_LOG_DIR: ${{ github.workspace }}/pms_logs

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
